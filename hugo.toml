baseURL = 'https://ikokem4.github.io/'
languageCode = 'ko'
defaultContentLanguage = 'ko'
title = 'ZINU의 테크노트'
theme = 'PaperMod'
[pagination]
  pagerSize = 10

# SEO 및 애드센스에 중요한 설정
[params]
  env = "production"
  description = "개발자 ZINU가 직접 경험하고 정리한 기술 블로그"
  author = "ZINU"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "안녕하세요, ZINU입니다"
    Content = "기술, 개발, 그리고 일상에서 발견한 것들을 기록합니다."

  [[params.socialIcons]]
    name = "email"
    url = "mailto:ikokem4@gmail.com"

# 메뉴 구성
[[menu.main]]
  identifier = "categories"
  name = "카테고리"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "태그"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "소개"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "privacy"
  name = "개인정보처리방침"
  url = "/privacy/"
  weight = 40

# SEO 설정
[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
