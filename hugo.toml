baseURL = 'https://zinutech.kr/'
languageCode = 'ko'
defaultContentLanguage = 'ko'
title = 'ZINU의 테크노트'
theme = 'PaperMod'
[pagination]
  pagerSize = 10

# SEO 및 애드센스에 중요한 설정
[params]
  env = "production"
  description = "AI, 하드웨어, IT 테크를 직접 경험하고 정리하는 블로그"
  author = "ZINU"
  defaultTheme = "auto"
  favicon = "/images/favicon.jpg"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.profileMode]
    enabled = true
    title = "안녕하세요, ZINU입니다"
    subtitle = "AI, 하드웨어, IT 테크에 대해 직접 써보고 기록합니다."
    imageUrl = "/images/profile.jpg"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "ZINU's 테크노트"

    [[params.profileMode.buttons]]
      name = "글 보기"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "소개"
      url = "/about/"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:ikokem4@gmail.com"

# 메뉴 구성
[[menu.main]]
  identifier = "categories"
  name = "카테고리"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "태그"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "소개"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "privacy"
  name = "개인정보처리방침"
  url = "/privacy/"
  weight = 40

# SEO 설정
[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
